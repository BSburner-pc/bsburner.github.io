<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[ BSburner Network Station ]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: block; position: absolute; top: 0.5; left: 0.5; z-index: 1; }
        .console {
            position: absolute; top: 50px; left: 50px; z-index: 2;
            background: rgba(0, 0, 0, 0.85); padding: 30px;
            border: 1px solid #00ff00; border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            color: #00ff00; width: 1000px; pointer-events: none;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; text-shadow: 0 0 5px #00ff00; }
        p { margin-bottom: 10px; font-size: 0.9rem; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="console">
        <h1>[ SYSTEM INITIALIZED: BSBURNER ]</h1>
        <p>> wsup </p>
        <p>> </p>
        <p>> </p>
        <p>> </p>
        <p>>  <span class="blink">_</span></p>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=<>!%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];
        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(draw, 30);
    </script>
</body>
</html>
