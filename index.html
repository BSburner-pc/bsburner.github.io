<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[ BSburner Net ]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: block; position: absolute; top: 0.5; left: 0.5; z-index: 1; }
        .console {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2;
            background: rgba(0, 0, 0, 0.85); padding: 30px;
            border: 1px solid #00ff00; border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            color: #00ff00; width: 80%; height:80%; pointer-events: none;
        }
        .heading {
            position: absolute; top:0%; left:0%; z-index: 2; background: rgba(0,0,0,1);
            padding: 10px; border: 1px solid #FFFFFF; border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            color: #FFFFFF; width: 100%; height:10% ; pointer-events: none;text-align: center;

        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; text-shadow: 0 0 5px #00ff00; }
        p { margin-bottom: 10px; font-size: 0.9rem; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="console">
        <h1>[ BSBURNER ]</h1>
        <p>> wsup </p>
        <p> </p>
        <p> </p>
        <p> </p>
        <p>  <span class="blink">_</span></p>
    </div>

    <div class="heading">
        <h1>       BSburner Web </h1>
    </div>
        
</body>
</html>
